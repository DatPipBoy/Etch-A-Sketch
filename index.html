<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align: center;">Etch-A-Sketch!</h1>

    <div id="main">
        <div id="options">
            <button id="reset">Reset</button>
                <div id="userEntry">    
                    <label for="gridSize">XY Axis size:</label>
                    <input type="number" id="gridSize" name="gridSize">

                    <label for="rgb">Random Color</label>
                    <input type="checkbox" id="rgb" name="rgb">

                    <label for="gradient">Gradient</label>
                    <input type="checkbox" id="gradient" name="gradient">
                </div>
            </div>
        <div id="sketchPad"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
